function makeCase(s,index,completed){const sections=AREAS.map(a=>({name:a,rating:s.sections[a].score,observation:s.sections[a].comment}));const id=(completed?'QA-EXAMPLE':'QA-2026-')+String(1040+index);const actions=(completed?s.reviewAreas:[]).map((r,i)=>({id:'ACT-'+String(i+1).padStart(3,'0'),area:r.area,owner:r.owner,due:todayKey(),outcome:r.outcome,status:'Completed'}));return {id,restaurant:s.restaurant,manager:s.manager,areaManager:s.areaManager,shopper:s.shopper,visitDate:new Date(Date.now()-86400000*(index+1)).toISOString(),score:s.score,status:completed?'Completed':'Open',completedBy:completed?'Example':'',completedAt:completed?new Date(Date.now()-3600000).toISOString():'',sections,summary:s.summary,reviewAreas:s.reviewAreas,areaDecisions:objectFromAreas(completed?'fromScenario':'blank',s.reviewAreas),actions,history:completed?['Example review completed.','Corrective action saved for '+(s.reviewAreas[0]?.area||'no action required')+'.']:[]};}

function validateCase(c){let errors=[];if(c.sections.length!==5)errors.push('wrong section count');c.sections.forEach(s=>{if(!AREAS.includes(s.name))errors.push('bad section '+s.name);const neg=/\b(slow|delayed|overdue|dirty|uncleared|not|weak|poor|needed|issue|lacked|hesitated|warm|waited)\b/i.test(s.observation);if(s.rating>=5&&neg)errors.push('positive rating has negative wording: '+s.name);if(s.rating<=2&&!neg)errors.push('low rating lacks issue wording: '+s.name);});if(c.reviewAreas.length>3)errors.push('too many review areas');c.reviewAreas.forEach(r=>{const sec=c.sections.find(s=>s.name===r.area);if(!sec)errors.push('review area missing in report '+r.area);else if(sec.rating>3)errors.push('review area rating too high '+r.area);if(!['Restaurant Manager','Area Manager'].includes(r.owner))errors.push('bad owner');});if(c.status==='Completed'){c.actions.forEach(a=>{const r=c.reviewAreas.find(x=>x.area===a.area);if(!r||a.outcome!==r.outcome)errors.push('completed action mismatch '+a.area);});}return errors;}

function makeFirestorePayload(){return {day:state.day||todayKey(),cases:Array.isArray(state.cases)?state.cases:[],updatedAt:serverTimestamp()};}
async function initialiseSharedWorkload(){try{app.innerHTML='<main style="padding:24px;font-family:Inter,Arial"><h1>Loading Quality Portal</h1><p>Connecting to shared daily workload...</p></main>';const snap=await getDoc(workloadRef);if(!snap.exists()){const fresh=generateWorkload();await setDoc(workloadRef,{day:fresh.day,cases:fresh.cases,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});}
unsubscribeWorkload=onSnapshot(workloadRef,(snapshot)=>{if(!snapshot.exists())return;const data=snapshot.data()||{};const oldSelected=state?.selectedId;const oldFilter=state?.filter||'All';const scrollPos=captureScroll();state={day:data.day||todayKey(),filter:oldFilter,selectedId:oldSelected,cases:Array.isArray(data.cases)?data.cases:[]};if(!state.cases.some(c=>c.id===state.selectedId)){state.selectedId=state.cases[0]?.id||null;}if(Date.now()<localEditUntil){return;}render(scrollPos);},(error)=>{app.innerHTML='<main style="padding:24px;font-family:Inter,Arial"><h1>Quality Portal could not connect</h1><p>'+safe(error.message)+'</p></main>';console.error(error);});}catch(err){app.innerHTML='<main style="padding:24px;font-family:Inter,Arial"><h1>Quality Portal could not load</h1><p>'+safe(err.message)+'</p></main>';console.error(err);}}

function showToast(message){
  const el=document.getElementById('toast');
  if(!el){return;}
  el.textContent=String(message||'');
  el.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer=setTimeout(()=>el.classList.remove('show'),2200);
}

function showStatus(message,type='warn'){
  const el=document.getElementById('reviewStatus');
  if(!el){showToast(message);return;}
  el.textContent=String(message||'');
  el.className='status-message show '+(type==='good'?'good':'warn');
}
function clearStatus(){
  const el=document.getElementById('reviewStatus');
  if(el){el.textContent='';el.className='status-message';}
}

async function saveState(){localEditUntil=Date.now()+1500;try{await setDoc(workloadRef,makeFirestorePayload(),{merge:true});}catch(err){console.error(err);showToast('Could not save online');}}
function counts(){return {all:state.cases.length,open:state.cases.filter(c=>c.status==='Open').length,completed:state.cases.filter(c=>c.status==='Completed').length,actions:state.cases.reduce((a,c)=>a+c.actions.length,0),avg:state.cases.length?Math.round(state.cases.reduce((a,c)=>a+c.score,0)/state.cases.length):0}}
function selected(){return state.cases.find(c=>c.id===state.selectedId)||state.cases[0]||null;}
function captureScroll(){return {win:window.scrollY||0,queue:document.querySelector('.queue')?.scrollTop||0,report:document.querySelector('.report-wrap')?.scrollTop||0,workspace:document.querySelector('.workspace-form')?.scrollTop||0};}
function restoreScroll(pos){if(!pos)return;requestAnimationFrame(()=>{window.scrollTo(0,pos.win||0);const q=document.querySelector('.queue');const r=document.querySelector('.report-wrap');const w=document.querySelector('.workspace-form');if(q)q.scrollTop=pos.queue||0;if(r)r.scrollTop=pos.report||0;if(w)w.scrollTop=pos.workspace||0;});}
function visibleCases(){return state.cases.filter(c=>state.filter==='All'||c.status===state.filter);}
function render(scrollPos){const c=selected();if(!c){app.innerHTML='<main style="padding:24px;font-family:Inter,Arial"><h1>No workload found</h1><p>Use New demo workload to create today’s cases.</p></main>';return;}const m=counts();app.innerHTML=`<div class="app"><aside class="sidebar" data-tour="queue"><div class="logo"><img src="../assets/nandos-logo.png" alt="Nando's"></div><div class="nav-title">Workspace</div>${nav('All','Reviews',m.all)}${nav('Open','Open',m.open)}${nav('Completed','Completed',m.completed)}<div class="nav-title">Support</div><button class="nav-btn" id="restartTour"><span>Guided Tour</span><span class="nav-count">Help</span></button><div class="suite"><a href="../index.html">Return to home</a></div></aside><main class="main"><header class="topbar"><div class="title"><h1>Restaurant Quality Portal</h1><p>Read imported mystery shopper reports, identify matching review areas and complete action records.</p></div><div class="controls"><span class="muted">${safe(state.day)}</span><label for="learnerName">Completed by</label><input class="name" id="learnerName" value="${safe(learnerName)}" placeholder="Enter name"><button class="btn small" id="saveName">Save</button><button class="btn small" id="newWorkload">New demo workload</button><button class="btn small" id="topTour">Tour</button><a class="btn small" href="../index.html">Return to home</a></div></header><section class="kpis"><div class="kpi"><span>Open Reviews</span><strong>${m.open}</strong></div><div class="kpi"><span>Completed</span><strong>${m.completed}</strong></div><div class="kpi"><span>Average Score</span><strong>${m.avg}%</strong></div><div class="kpi"><span>Actions Logged</span><strong>${m.actions}</strong></div></section><section class="workspace"><div class="panel"><div class="panel-head"><div><h2>Review Queue</h2><p>${visibleCases().length} reviews visible</p></div><span class="pill open">Daily workload</span></div><div class="scroll queue" data-tour="caseList">${visibleCases().map(caseCard).join('')}</div></div><div class="panel"><div class="panel-head"><div><h2>Imported Mystery Shopper Report</h2><p>${safe(c.id)} · ${safe(c.restaurant)}</p></div><span class="readonly">Read only</span></div><div class="scroll report-wrap" data-tour="report">${reportDoc(c)}</div></div><div class="panel review-panel"><div class="panel-head"><div><h2>Review Workspace</h2><p>Use the same five areas as the report</p></div><span class="pill ${c.status==='Completed'?'done':'open'}">${safe(c.status)}</span></div><div class="scroll workspace-form" data-tour="workspace">${reviewWorkspace(c)}</div><div class="foot"><button class="btn" id="addAction" data-tour="addAction">Add Action</button><button class="btn primary" id="completeReview" ${c.status==='Completed'?'disabled':''} data-tour="complete">Complete Review</button></div></div></section></main></div>`;wire();restoreScroll(scrollPos);if(!localStorage.getItem(TOUR_KEY))showWelcome();}
function nav(key,label,count){return `<button class="nav-btn ${state.filter===key?'active':''}" data-filter="${key}"><span>${label}</span><span class="nav-count">${count}</span></button>`;}
function caseCard(c){return `<button class="case ${c.id===state.selectedId?'active':''}" data-case="${safe(c.id)}"><h3>${safe(c.restaurant)}</h3><p>${safe(c.id)} · ${formatDate(c.visitDate)} · Score ${c.score}%</p><div class="case-foot"><span class="pill ${c.status==='Completed'?'done':'open'}">${safe(c.status)}</span><span class="muted">${c.status==='Completed'?'Completed by '+safe(c.completedBy||'Unknown'):'Requires review'}</span></div></button>`;}
function reportDoc(c){const rows=c.sections.map(s=>`<tr><td>${safe(s.name)}</td><td class="${ratingClass(s.rating)}">${s.rating}/5</td><td>${safe(s.observation)}</td></tr>`).join('');return `<article class="report-doc"><div class="report-top"><div><h2>Restaurant Visit<br>Report</h2><p>Service Measure UK<br>Confidential operations report</p></div><div class="ref"><strong>${safe(c.id)}</strong><br>Internal quality document</div></div><table class="report-table"><tr><th>Restaurant</th><td>${safe(c.restaurant)}</td><th>Visit Date</th><td>${formatDate(c.visitDate)}</td></tr><tr><th>Shopper ID</th><td>${safe(c.shopper)}</td><th>Overall Score</th><td><strong>${c.score}%</strong></td></tr><tr><th>Rating Band</th><td colspan="3">${scoreBand(c.score)}</td></tr></table><div class="section-title">Executive Summary</div><p class="para">${safe(c.summary)}</p><table class="report-table"><thead><tr><th>Section</th><th>Rating</th><th>Observation</th></tr></thead><tbody>${rows}</tbody></table><div class="section-title">Overall Score</div><div class="score">${c.score}%</div><p class="para">This report has been imported for Head Office review. The Operations Assistant should only create actions for areas that are supported by the report.</p></article>`;}
function reviewWorkspace(c){const completed=c.status==='Completed';return `<div class="mini-card"><strong>Case information</strong><p>Restaurant Manager: ${safe(c.manager)}<br>Area Manager: ${safe(c.areaManager)}<br>Shopper ID: ${safe(c.shopper)}</p></div><div id="reviewStatus" class="status-message"></div><div class="notice">Choose up to three areas for action. Use the same five areas shown in the mystery shopper report. Then add at least one corrective action before completing the review.</div>${AREAS.map(a=>areaBlock(c,a,completed)).join('')}<div class="field"><label>Corrective actions</label><div class="actions-list">${c.actions.length?c.actions.map(actionRow).join(''):'<div class="mini-card"><p>No actions have been added yet. Use Add Action when you have chosen an area that needs action.</p></div>'}</div></div><div class="field"><label>Case history</label><div class="history">${c.history.length?c.history.map(h=>'• '+safe(h)).join('<br>'):'No activity recorded yet.'}</div></div>${completed?`<div class="mini-card"><strong>Completed review</strong><p>Completed by ${safe(c.completedBy)} at ${formatTime(c.completedAt)}.</p></div>`:''}`;}
function areaBlock(c,area,readonly){const d=c.areaDecisions[area]||{needsAction:false,level:'',finding:'',owner:'Restaurant Manager'};return `<div class="review-area"><div class="review-area-head"><span class="review-area-title">${safe(area)}</span><span class="muted">Matches report section</span></div><div class="radio-row"><label><input type="radio" name="need_${area}" data-area="${area}" value="no" ${!d.needsAction?'checked':''} ${readonly?'disabled':''}> No action</label><label><input type="radio" name="need_${area}" data-area="${area}" value="yes" ${d.needsAction?'checked':''} ${readonly?'disabled':''}> Action needed</label></div>${d.needsAction?`<div class="field"><label>Concern level</label><select data-level="${area}" ${readonly?'disabled':''}>${['Low','Medium','High'].map(v=>`<option ${d.level===v?'selected':''}>${v}</option>`).join('')}</select></div><div class="field"><label>Review summary</label><textarea data-finding="${area}" ${readonly?'disabled':''} placeholder="Write what the report shows for this area.">${safe(d.finding)}</textarea></div><div class="field"><label>Refer to</label><select data-owner="${area}" ${readonly?'disabled':''}><option ${d.owner==='Restaurant Manager'?'selected':''}>Restaurant Manager</option><option ${d.owner==='Area Manager'?'selected':''}>Area Manager</option></select></div>`:''}</div>`;}
function actionRow(a){return `<div class="action-row"><strong>${safe(a.id)} · ${safe(a.area)}</strong><p>${safe(a.owner)} · Due ${safe(a.due||'not set')} · ${safe(a.status||'Open')}</p><p>${safe(a.outcome)}</p></div>`;}
function wire(){
  document.querySelectorAll('[data-filter]').forEach(b=>b.onclick=()=>{const pos=captureScroll();state.filter=b.dataset.filter;render(pos);saveState();});
  document.querySelectorAll('[data-case]').forEach(b=>b.onclick=()=>{state.selectedId=b.dataset.case;render();saveState();});
  document.getElementById('saveName').onclick=()=>{learnerName=document.getElementById('learnerName').value.trim();localStorage.setItem(NAME_KEY,learnerName);showToast('Name saved');};
  document.getElementById('learnerName').onchange=e=>{learnerName=e.target.value.trim();localStorage.setItem(NAME_KEY,learnerName);};
  document.getElementById('newWorkload').onclick=()=>{if(confirm('Generate a new shared workload for today? This will replace today’s Quality Portal reviews for all devices.')){const fresh=generateWorkload();state.day=fresh.day;state.cases=fresh.cases;state.selectedId=fresh.selectedId;render();saveState();showToast('Shared workload generated');}};
  document.getElementById('restartTour').onclick=()=>startTour();
  document.getElementById('topTour').onclick=()=>startTour();

  const form=document.querySelector('.workspace-form');
  if(form){
    form.onclick=(event)=>{
      const radio=event.target.closest('input[data-area][type="radio"]');
      if(!radio || radio.disabled) return;
      handleAreaChoice(radio);
    };
    form.onchange=(event)=>{
      const radio=event.target.closest('input[data-area][type="radio"]');
      if(radio && !radio.disabled){handleAreaChoice(radio);return;}
      const editable=event.target.closest('[data-level],[data-finding],[data-owner]');
      if(editable) saveCurrent(false);
    };
    form.oninput=(event)=>{
      const editable=event.target.closest('[data-level],[data-finding],[data-owner]');
      if(editable) saveCurrent(false);
    };
  }

  const addBtn=document.getElementById('addAction');
  if(addBtn){addBtn.onclick=(event)=>{event.preventDefault();clearStatus();saveCurrent(false);openModal(selected()?.id);};}
  const completeBtn=document.getElementById('completeReview');
  if(completeBtn){completeBtn.onclick=(event)=>{event.preventDefault();completeCurrent();};}
}

function attrValue(value){
  return String(value).replace(/\\/g,'\\\\').replace(/"/g,'\\"');
}
function saveCurrent(online=true){
  const c=selected();
  if(!c || c.status==='Completed') return;
  AREAS.forEach(area=>{
    if(!c.areaDecisions[area]) c.areaDecisions[area]={needsAction:false,level:'',finding:'',owner:'Restaurant Manager'};
    const key=attrValue(area);
    const level=document.querySelector(`[data-level="${key}"]`);
    const finding=document.querySelector(`[data-finding="${key}"]`);
    const owner=document.querySelector(`[data-owner="${key}"]`);
    if(level) c.areaDecisions[area].level=level.value;
    if(finding) c.areaDecisions[area].finding=finding.value.trim();
    if(owner) c.areaDecisions[area].owner=owner.value;
  });
  // Do not write to Firestore on every keystroke. The state is saved when an action is added or the review is completed.
}

function handleAreaChoice(el){
  const pos=captureScroll();
  const c=selected();
  if(!c || c.status==='Completed') return;
  const area=el.dataset.area;
  if(!c.areaDecisions[area]) c.areaDecisions[area]={needsAction:false,level:'',finding:'',owner:'Restaurant Manager'};
  const d=c.areaDecisions[area];
  const wantsAction=el.value==='yes';
  const currentCount=AREAS.filter(a=>a!==area && c.areaDecisions[a]?.needsAction).length;
  if(wantsAction && currentCount>=3){
    showStatus('You already have three action areas. Remove one before adding another. You do not need to review every low score.', 'warn');
    showToast('Maximum three action areas');
    render(pos);
    return;
  }
  d.needsAction=wantsAction;
  if(wantsAction){
    d.level=d.level||'Medium';
    d.owner=d.owner||suggestOwner(c,area);
    if(d.finding && d.finding.startsWith('Example:')) d.finding='';
    showStatus('Action area selected. Now add a short review summary, then press Add Action.', 'good');
  }else{
    d.finding='';
    d.level='';
    d.owner='Restaurant Manager';
    c.actions=c.actions.filter(a=>a.area!==area);
    showStatus('Action area removed.', 'good');
  }
  render(pos);
  saveState();
}

function suggestOwner(c,area){
  const match=(c.reviewAreas||[]).find(r=>r.area===area);
  return match?.owner || (area==='Food Quality' && c.sections?.find(s=>s.name===area)?.rating<=2 ? 'Area Manager' : 'Restaurant Manager');
}

function completeCurrent(){
  saveCurrent(false);
  const c=selected();
  if(!c){showStatus('No review is selected.', 'warn');return;}
  if(c.status==='Completed'){showStatus('This review is already completed.', 'good');showToast('Already completed');return;}
  const name=(document.getElementById('learnerName')?.value||learnerName).trim();
  if(!name){showStatus('Enter your name at the top before completing the review.', 'warn');showToast('Enter your name first');return;}
  const needed=AREAS.filter(a=>c.areaDecisions[a]?.needsAction);
  if(needed.length>3){showStatus('Choose no more than three action areas. Remove one action area before completing.', 'warn');return;}
  if(c.score<90 && needed.length===0){showStatus('This report needs at least one area marked Action needed before it can be completed.', 'warn');return;}
  if(c.score<90 && c.actions.length===0){showStatus('Add at least one corrective action before completing this review.', 'warn');return;}
  c.status='Completed';
  c.completedBy=name;
  c.completedAt=new Date().toISOString();
  c.history.push('Review completed by '+name+' at '+formatTime(c.completedAt));
  learnerName=name;
  localStorage.setItem(NAME_KEY,name);
  showStatus('Review completed by '+name+'. This will update for everyone using the shared workload.', 'good');
  render(captureScroll());
  saveState();
  showToast('Review completed');
}
function openModal(id){
  modalCaseId=id;
  const c=selected();
  if(!c){showStatus('No review is selected.', 'warn');return;}
  if(c.status==='Completed'){showStatus('This review is completed. It cannot be edited.', 'warn');return;}
  const select=document.getElementById('actionArea');
  const options=AREAS.filter(a=>c.areaDecisions[a]?.needsAction);
  select.innerHTML=(options.length?options:AREAS).map(a=>`<option>${safe(a)}</option>`).join('');
  document.getElementById('actionOwner').value=(c.areaDecisions[select.value]?.owner)||suggestOwner(c,select.value);
  select.onchange=()=>{document.getElementById('actionOwner').value=(c.areaDecisions[select.value]?.owner)||suggestOwner(c,select.value);};
  document.getElementById('actionDue').value=todayKey();
  document.getElementById('actionOutcome').value='';
  document.getElementById('modal').classList.add('show');
  document.getElementById('modal').setAttribute('aria-hidden','false');
}
function closeModal(){document.getElementById('modal').classList.remove('show');document.getElementById('modal').setAttribute('aria-hidden','true');modalCaseId=null;}
document.getElementById('cancelAction').onclick=closeModal;document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeModal();});document.getElementById('saveAction').onclick=()=>{const c=state.cases.find(x=>x.id===modalCaseId);if(!c){showToast('No review selected');return;}const area=document.getElementById('actionArea').value;const outcome=document.getElementById('actionOutcome').value.trim();if(!outcome){showToast('Add an expected outcome');return;}const existing=c.actions.find(a=>a.area===area);if(existing){existing.owner=document.getElementById('actionOwner').value;existing.due=document.getElementById('actionDue').value;existing.outcome=outcome;existing.status=existing.status||'Open';c.history.push('Action updated for '+area+'.');}else{const n=String(c.actions.length+1).padStart(3,'0');c.actions.push({id:'ACT-'+n,area,owner:document.getElementById('actionOwner').value,due:document.getElementById('actionDue').value,outcome,status:'Open'});c.history.push('Action '+n+' created for '+area+'.');}const pos=captureScroll();closeModal();render(pos);saveState();showToast('Action saved');};
function showWelcome(){document.getElementById('welcome').classList.add('show');}
document.getElementById('skipTour').onclick=()=>{localStorage.setItem(TOUR_KEY,'skipped');document.getElementById('welcome').classList.remove('show');};document.getElementById('startTour').onclick=()=>{document.getElementById('welcome').classList.remove('show');startTour();};
const tourSteps=[{sel:'[data-tour="caseList"]',title:'Today\'s reviews',text:'These are the mystery shopper reports for today. Open reports still need reviewing. Completed reports show who finished them.'},{sel:'.case',title:'Start with the example',text:'The first case is a completed example. It shows how the report, review workspace and action record should match.'},{sel:'[data-tour="report"]',title:'Read the imported report',text:'The report is read only. Check the five sections: Arrival, Ordering, Food Quality, Cleanliness and Departure.'},{sel:'[data-tour="workspace"]',title:'Use matching review areas',text:'The review workspace uses the same five section names. Only mark Action needed when the report shows an issue.'},{sel:'[data-tour="addAction"]',title:'Create corrective actions',text:'Add actions only for areas that need improvement. Choose Restaurant Manager or Area Manager as the owner.'},{sel:'[data-tour="complete"]',title:'Complete the review',text:'When the action record matches the report, complete the review. Your name will show on the completed case.'}];
function startTour(){localStorage.setItem(TOUR_KEY,'seen');tourIndex=0;showTourStep();}
function showTourStep(){document.querySelectorAll('.tour-highlight').forEach(e=>e.classList.remove('tour-highlight'));const backdrop=document.getElementById('tourBackdrop');const card=document.getElementById('tourCard');if(tourIndex>=tourSteps.length){closeTour();showToast('Tour complete');return;}const step=tourSteps[tourIndex];const el=document.querySelector(step.sel);backdrop.classList.add('show');card.classList.add('show');document.getElementById('tourTitle').textContent=step.title;document.getElementById('tourText').textContent=step.text;document.getElementById('tourNext').textContent=tourIndex===tourSteps.length-1?'Finish':'Next';card.style.left='auto';card.style.top='auto';card.style.right='24px';card.style.bottom='24px';if(window.innerWidth<760){card.style.left='16px';card.style.right='16px';card.style.bottom='16px';}if(el){el.classList.add('tour-highlight');el.scrollIntoView({block:'center',inline:'nearest'});}}
document.getElementById('tourNext').onclick=()=>{tourIndex+=1;showTourStep();};document.getElementById('tourClose').onclick=closeTour;function closeTour(){document.getElementById('tourBackdrop').classList.remove('show');document.getElementById('tourCard').classList.remove('show');document.querySelectorAll('.tour-highlight').forEach(e=>e.classList.remove('tour-highlight'));}
function formatDate(iso){return new Date(iso).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});}function formatTime(iso){return new Date(iso).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});}function scoreBand(score){if(score>=90)return 'Excellent';if(score>=80)return 'Good';if(score>=70)return 'Improvement required';return 'Action plan required';}function ratingClass(r){if(r>=4)return 'rating-high';if(r===3)return 'rating-mid';return 'rating-low';}
initialiseSharedWorkload();
})();
</script>
</body>
</html>
